name: CI matrix
on:
  - push
env:
  WORKDIR: /work-dir/ansible_collections/scale_computing/hypercore
jobs:
  matrix-test:
    strategy:
      matrix:
        sc_version: [9.1, 9.2]
    runs-on: [ubuntu-latest]
    container: python:3.10-slim-buster
    env:
      SC_ALL: ${{ secrets.SC_ALL_91 }}
      IND: 0
    steps:
      - run: echo ENV VARS are IND=$IND matrix.sc_version=${{ matrix.sc_version }}
      - run: pip install pyyaml
      - run: python -c 'import yaml, sys; dd=yaml.safe_load(sys.stdin); print(dd);'

