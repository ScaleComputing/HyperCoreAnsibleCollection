name: CI matrix
on:
  - push
env:
  WORKDIR: /work-dir/ansible_collections/scale_computing/hypercore
jobs:
  matrix-test:
    strategy:
      matrix:
        sc_version: [9.1, 9.2]
    runs-on: [ubuntu-latest]
    container: python:3.10-slim-buster
    env:
      # SC_ALL: ${{ secrets.SC_ALL_91 }}
      SC_VERSION: ${{ matrix.sc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - run: echo ENV VARS are IND=$IND matrix.sc_version=${{ matrix.sc_version }} SC_VERSION=$SC_VERSION
      - run: pip install pyyaml
      - run: cat .github/sample_data_sc_all.yml | python .github/load_sc_secrets.py > ci_new_env.sh
      # use ".", not "source" (bash vs. ubuntu dash)
      - run: . ci_new_env.sh
      - run: python .github/load_sc_secrets.py
